name: release

# Push a tag matching v* (e.g. v1.0.0) to publish to PyPI. The tag
# must match pyproject.toml's version field; the workflow asserts
# this before building so a typo can't ship a mismatched wheel.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no long-lived API
# token. Configure the publisher once at
# https://pypi.org/manage/project/clavenar-agent-sdk/settings/publishing/
# pointing at this repo + workflow + the `pypi` environment.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # OIDC token for PyPI Trusted Publishing.
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' (version '$TAG') does not match pyproject.toml '$PKG'"
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
